name: Transactionify Payment Gateway

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
  release:
    types: [ published ]

jobs:
  compliance-and-build:
    name: Platform Guardrails & Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install DevEx Golden Path CLI
        run: |
          pip install uv
          rm -rf .venv ./devex-cli/.venv
          pip install "devex-cli@git+https://github.com/danileao/devex-cli@v0.2.0"

      - name: Verify Shift-Left Branch Governance
        run: |
          echo "==> [DevEx Platform] Enforcing Work ID compliance checks..."
          devex check-branch

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'
          run_install: false

      - name: Execute Engineering Build Step
        run: pnpm install
      - name: Execute Engineering Build Step
        run: pnpm test:ci

      - name: Enforce Two-Reviewer Rule (SOC 2)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "==> [DevEx Platform] Verifying Two-Reviewer approval gate..."
          REVIEWS=$(gh api \
            "repos/${{ github.repository }}/pulls/${{ github.event.number }}/reviews" \
            --jq '[.[] | select(.state == "APPROVED")] | length')
          echo "Approvals found: $REVIEWS (required: 2)"
          if [ "$REVIEWS" -lt 2 ]; then
            echo "❌ [DevEx Platform] Two-Reviewer Rule FAILED. Only $REVIEWS approval(s) found, 2 required."
            exit 1
          fi
          echo "✔ [DevEx Platform] Two-Reviewer Rule satisfied."

      - name: Emit SOC 2 Compliance Audit Trail
        if: success()
        run: |
          echo "==> [Audit Trail] Verification passed successfully."
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "Team Owner: FIN"
          echo "Required Reviewers Gate: 2"

  small-tests:
    name: Small Tests (Unit · PBT · Contract)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'
          run_install: false
      - name: Install Dependencies
        run: pnpm install
      - name: Unit Tests
        run: pnpm test:ci
      - name: Property-Based Testing
        run: pnpm test:pbt
      - name: API Contract Validation
        run: pnpm test:contract

  deploy:
    name: Environment Promotion (${{ matrix.environment }})
    needs: [ compliance-and-build, small-tests ]
    if: always()
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [sandbox, staging, production]
    environment:
      name: ${{ matrix.environment }}
    concurrency:
      group: ${{ matrix.environment }}-deploy
      cancel-in-progress: ${{ matrix.environment == 'production' && false || true }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Deploy ${{ matrix.environment }}
        run: |
          echo "==> [DevEx Platform] Promoting to ${{ matrix.environment }}..."
          echo "cdk deploy --app 'infra/cdk-stack-${{ matrix.environment }}.json' --require-approval never"
